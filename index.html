<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260323-1" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title">Snake</div>
        <div class="stats">
          <div class="stat">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Best</span>
            <span id="bestScore" class="value">0</span>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="hud">
          <div id="status" class="status" aria-live="polite"></div>
          <div class="buttons">
            <button id="btnPause" class="btn" type="button" title="Space">Pause</button>
            <button id="btnRestart" class="btn" type="button" title="R">Restart</button>
          </div>
        </div>

        <div class="boardWrap">
          <div class="boardContainer">
            <div
              id="board"
              class="board"
              role="application"
              aria-label="Snake game board"
              tabindex="0"
            ></div>

            <div id="menu" class="menuOverlay" role="dialog" aria-label="Game menu">
              <div class="menuCard">
                <div class="menuHeader">
                  <div class="menuTitle">Snake</div>
                  <div id="menuSubtitle" class="menuSubtitle">Classic mode</div>
                </div>

                <div class="menuScreens">
                  <div class="menuScreen" data-screen="main">
                    <button id="menuStart" class="menuBtn" type="button">Start</button>
                    <button id="menuOptions" class="menuBtn" type="button">Options</button>
                    <button id="menuQuit" class="menuBtn" type="button">Quit</button>
                  </div>

                  <div class="menuScreen" data-screen="options" hidden>
                    <label class="field">
                      <span class="fieldLabel">Speed</span>
                      <select id="optSpeed" class="fieldControl">
                        <option value="160">Slow</option>
                        <option value="120">Normal</option>
                        <option value="90">Fast</option>
                      </select>
                    </label>

                    <label class="field">
                      <span class="fieldLabel">Grid</span>
                      <select id="optGrid" class="fieldControl">
                        <option value="16">16 x 16</option>
                        <option value="20">20 x 20</option>
                        <option value="24">24 x 24</option>
                      </select>
                    </label>

                    <label class="field">
                      <span class="fieldLabel">Start length</span>
                      <select id="optLen" class="fieldControl">
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                      </select>
                    </label>

                    <div class="menuRow">
                      <button id="optBack" class="btn" type="button">Back</button>
                      <button id="optApply" class="btn primary" type="button">Apply</button>
                    </div>
                  </div>

                  <div class="menuScreen" data-screen="quit" hidden>
                    <div class="menuText">
                      The game is stopped. You can close this tab, or go back to the menu.
                    </div>
                    <div class="menuRow">
                      <button id="quitBack" class="btn primary" type="button">Back to Menu</button>
                    </div>
                  </div>
                </div>

                <div class="menuHint">Enter: start. Esc: menu.</div>
              </div>
            </div>
          </div>
        </div>

        <div class="help">Controls: Arrow keys / WASD to move, Space to pause, R to restart.</div>
      </section>

      <section class="touchControls" aria-label="On-screen controls">
        <div class="dpad">
          <button class="pad padUp" data-dir="up" type="button">Up</button>
          <button class="pad padLeft" data-dir="left" type="button">Left</button>
          <button class="pad padRight" data-dir="right" type="button">Right</button>
          <button class="pad padDown" data-dir="down" type="button">Down</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js?v=20260323-1"></script>
  </body>
</html>
